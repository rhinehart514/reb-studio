stage: mvp
mode: build

diagnosis: |
  REB Studio is a productized web agency. Laney builds custom sites, clients get
  a dashboard + AI agent that manages ongoing content updates. Square integration
  syncs services/hours automatically.

  Chelsea's custom site is built. The dashboard and AI agent are functional.
  The bottleneck is putting it in front of Chelsea and watching her use the
  AI chat to make a real change to her real site.

bottleneck: chelsea-uses-dashboard
bottleneck_reason: "The custom site exists. The AI agent works. But Chelsea hasn't opened the dashboard or chatted with the AI yet. Until she does, we don't know if this model works."

bets:
  - name: square-onboarding-works
    confidence: 0.6
    evidence: "OAuth flow is complete, sync maps catalog to content, but untested with real Square data"
    risk: "Square sandbox data ≠ real merchant data shapes. Edge cases in catalog mapping."

  - name: ai-chat-is-preferred
    confidence: 0.4
    evidence: "Chat UI exists, AI agent has tools, but no user preference data"
    risk: "Business owners may not trust AI to edit their site. May prefer forms."

  - name: pricing-converts
    confidence: 0.3
    evidence: "$49 first month is aggressive. No market testing."
    risk: "Could be too cheap (looks low quality) or too expensive (compared to free)."

anti-patterns:
  - "Building more features before validating the first user's experience"
  - "Polishing the landing page before proving the product works"
  - "Adding multi-tenant before proving single-tenant"
