stage: mvp
mode: build

diagnosis: |
  Chelsea has NO website. Her web presence is LinkTree → Vagaro. Every competitor
  (StretchLab, Stretchd Out, Spa 400) has a real site. She has a 5.0 Vagaro rating
  but zero public reviews. She's behind on SEO surface, not service quality.

  Her differentiator is real: decade of PT experience, personal connection vs franchise
  studios, burnout-pivot story that resonates. None of this is visible online.

  The product is a custom site Laney built + AI agent to manage it. NOT self-serve.
  NOT AI-generated. Chelsea gets a professional site that makes her look like the
  premium solo practitioner she is, plus a dashboard to manage it without calling Laney.

  Key insight: she's on VAGARO, not Square. The Square integration is for future
  clients. Chelsea needs Vagaro booking embedded in her site.

bottleneck: chelsea-has-real-content
bottleneck_reason: |
  The site template is built but running on defaults. Chelsea needs to provide:
  1. Service menu with actual prices (nothing is public anywhere)
  2. Her story in her own words (PT background, why she pivoted)
  3. Real testimonials from clients (5.0 on Vagaro but locked inside the platform)
  4. Photos of her and the space
  Until we have real content, we can't deploy. Until we deploy, we can't validate.

bets:
  - name: site-beats-linktree
    confidence: 0.9
    evidence: "Every competitor has a real site. Chelsea has LinkTree. The bar is low."
    risk: "Chelsea may not prioritize providing content if she's busy with clients."

  - name: seo-brings-new-clients
    confidence: 0.5
    evidence: "No one ranks for 'assisted stretching Williamsville NY' with a real site. Low competition."
    risk: "Search volume may be too low. People may find stretching services through Vagaro search, not Google."

  - name: ai-agent-used-over-texting
    confidence: 0.4
    evidence: "Chat UI works, tools are functional. But Chelsea may prefer texting Laney."
    risk: "If she never opens the dashboard, the $199/mo value is just the site itself — hard to justify vs one-time build."

anti-patterns:
  - "Building Square integration when Chelsea is on Vagaro"
  - "Building class schedule when she only does 1:1 appointments"
  - "Building provider directory when she's a solo practitioner"
  - "Building intake forms when Vagaro handles this"
  - "Building analytics before deploying the site"

do-not-build:
  - Class schedule (she does 1:1 only, no group classes)
  - Provider directory (solo practitioner)
  - Intake forms (Vagaro handles this)
  - E-commerce / gift cards (not yet)
  - Before/after gallery (not relevant for stretching)
  - Membership tiers (premature — needs client volume first)
