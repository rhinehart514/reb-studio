    features: [onboarding, square-integration, ai-agent, client-site, dashboard]
    criteria: "One real business owner completes onboarding and uses the dashboard"
    status: in-progress

  - name: "v0.2 — Retention Signal"
    features: [ai-agent, dashboard]
    criteria: "First user returns unprompted within 7 days"
    status: planned

  - name: "v0.3 — Second Client"
    features: [infrastructure, landing-page]
    criteria: "Second business signs up via landing page"
    status: planned
