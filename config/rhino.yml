project:
  name: reb-studio
  stage: mvp
  mode: build
  type: web

value:
  hypothesis: "Chelsea will pay $199/mo for a custom-built site + AI agent that handles content updates — IF the site looks more professional than her LinkTree+Vagaro and brings in clients she wouldn't have gotten otherwise."
  user: "Chelsea Rohl, solo assisted stretching practitioner in Williamsville NY, PT background, part-time (~20hrs/week), booking through Vagaro"
  signals:
    - "Chelsea prefers chatting with AI over texting Laney for content changes"
    - "Chelsea's site ranks for 'assisted stretching Williamsville NY' within 30 days"
    - "Chelsea gets a booking from someone who found her through the site (not Vagaro/referral)"
    - "Chelsea opens the dashboard unprompted within 7 days"

features:
  # ============================================================
  # CHELSEA'S SITE — what her potential clients see
  # ============================================================

  - name: service-menu
    status: active
    weight: 5
    description: Service menu with real prices, durations, and Vagaro booking links
    delivers: "Potential clients see exactly what Chelsea offers, what it costs, and can book instantly"
    for: "Someone Googling 'assisted stretching near me' who needs to decide in 30 seconds"
    code:
      - apps/web/src/components/public/Services.tsx
      - apps/web/src/lib/types.ts
      - apps/web/src/lib/defaults.ts

  - name: booking-integration
    status: active
    weight: 5
    description: Vagaro booking embedded in-site — clients never leave to a third-party page
    delivers: "One-click booking without the friction of redirecting to Vagaro"
    for: "Potential client ready to book who will bounce if sent to another site"
    code:
      - apps/web/src/components/public/Booking.tsx

  - name: founder-story
    status: active
    weight: 4
    description: Chelsea's PT background + burnout pivot — the key differentiator vs StretchLab
    delivers: "Trust and connection — why choose a solo PT over a franchise studio"
    for: "Client comparing Chelsea to StretchLab/Stretchd Out who needs a reason to pick her"
    code:
      - apps/web/src/components/public/Story.tsx
      - apps/web/src/lib/defaults.ts

  - name: social-proof
    status: active
    weight: 4
    description: Testimonials from real clients — surface the 5.0 Vagaro rating publicly
    delivers: "Trust signals that convert browsers to bookers"
    for: "Someone on the fence about trying assisted stretching for the first time"
    code:
      - apps/web/src/components/public/Testimonials.tsx

  - name: local-seo
    status: active
    weight: 5
    description: SEO targeting 'assisted stretching Williamsville NY' and 'Buffalo NY'
    delivers: "Chelsea shows up when potential clients search — currently invisible on Google"
    for: "Anyone searching for stretching/mobility services in the Buffalo metro"
    code:
      - apps/web/src/app/(client-site)/layout.tsx
      - apps/web/src/app/robots.ts
      - apps/web/src/app/sitemap.ts

  - name: location-access
    status: active
    weight: 3
    description: Clear directions — inside Bel Viso Skin Studio, 2nd floor, 7158 Transit Rd
    delivers: "Clients actually find her without calling to ask where the entrance is"
    for: "First-time client who has never been to the building"
    code:
      - apps/web/src/components/public/Contact.tsx

  # ============================================================
  # CHELSEA'S DASHBOARD — what she sees
  # ============================================================

  - name: ai-agent
    status: active
    weight: 5
    description: AI chat agent that manages Chelsea's custom site via natural language
    delivers: "Instant content updates — change hours, add a testimonial, update prices by chatting"
    for: "Chelsea when she needs a quick change and doesn't want to wait"
    code:
      - apps/web/src/app/api/agent/route.ts
      - apps/web/src/app/api/chat/route.ts
      - apps/web/src/app/api/activity/route.ts
      - apps/web/src/components/dashboard/ChatPanel.tsx

  - name: dashboard
    status: active
    weight: 4
    description: Business dashboard — site sections, activity feed, quick actions
    delivers: "At-a-glance view of site status and one-tap content management"
    for: "Chelsea checking on her site between appointments"
    code:
      - apps/web/src/app/dashboard/
      - apps/web/src/components/dashboard/

  # ============================================================
  # REB MARKETING — what sells the product
  # ============================================================

  - name: landing-page
    status: active
    weight: 3
    description: REB Studio marketing page — sells custom sites + AI management
    delivers: "Convincing pitch that converts Chelsea's network to signups"
    for: "Local business owner evaluating whether to sign up"
    code:
      - apps/marketing/src/app/page.tsx
      - apps/marketing/src/components/landing/

  # ============================================================
  # INFRASTRUCTURE — supports everything
  # ============================================================

  - name: infrastructure
    status: active
    weight: 2
    description: Auth, storage, types, schemas, middleware, content API
    delivers: "Reliable data layer and auth for all features"
    for: "All features depend on this"
    code:
      - apps/web/src/lib/types.ts
      - apps/web/src/lib/schemas.ts
      - apps/web/src/lib/storage.ts
      - apps/web/src/lib/auth.ts
      - apps/web/src/middleware.ts
      - apps/web/src/app/api/auth/
      - apps/web/src/app/api/content/
      - apps/web/src/app/api/upload/route.ts
