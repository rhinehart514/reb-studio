# REB Studio — Mechanical Assertions
# Aligned to Chelsea's actual features

assertions:

  # --- Service Menu ---
  - id: services-component
    type: file_check
    path: apps/web/src/components/public/Services.tsx
    expect_contains: "booking_link"
    feature: service-menu
    description: "Services component renders booking links per service"

  - id: services-types
    type: file_check
    path: apps/web/src/lib/types.ts
    expect_contains: "ServiceItem"
    feature: service-menu
    description: "Service type includes name, price, duration, booking_link"

  - id: services-defaults
    type: file_check
    path: apps/web/src/lib/defaults.ts
    expect_contains: "defaultServices"
    feature: service-menu
    description: "Default services data exists"

  # --- Booking Integration ---
  - id: booking-component
    type: file_check
    path: apps/web/src/components/public/Booking.tsx
    feature: booking-integration
    description: "Booking component exists for Vagaro integration"

  - id: booking-cta
    type: file_check
    path: apps/web/src/components/public/Booking.tsx
    expect_contains: "booking"
    feature: booking-integration
    description: "Booking component has booking link/CTA"

  # --- Founder Story ---
  - id: story-component
    type: file_check
    path: apps/web/src/components/public/Story.tsx
    expect_contains: "statement"
    feature: founder-story
    description: "Story component renders founder statement"

  - id: story-stats
    type: file_check
    path: apps/web/src/components/public/Story.tsx
    expect_contains: "stats"
    feature: founder-story
    description: "Story shows credential stats (years experience, etc.)"

  # --- Social Proof ---
  - id: testimonials-component
    type: file_check
    path: apps/web/src/components/public/Testimonials.tsx
    expect_contains: "quote"
    feature: social-proof
    description: "Testimonials component renders client quotes"

  # --- Local SEO ---
  - id: seo-jsonld
    type: file_check
    path: apps/web/src/app/(client-site)/layout.tsx
    expect_contains: "LocalBusiness"
    feature: local-seo
    description: "JSON-LD LocalBusiness schema in site layout"

  - id: seo-meta
    type: file_check
    path: apps/web/src/app/(client-site)/layout.tsx
    expect_contains: "openGraph"
    feature: local-seo
    description: "OpenGraph metadata set from settings"

  - id: seo-robots
    type: file_check
    path: apps/web/src/app/robots.ts
    expect_contains: "sitemap"
    feature: local-seo
    description: "Robots.txt references sitemap"

  - id: seo-sitemap
    type: file_check
    path: apps/web/src/app/sitemap.ts
    feature: local-seo
    description: "Sitemap.xml generated"

  # --- Location/Access ---
  - id: contact-component
    type: file_check
    path: apps/web/src/components/public/Contact.tsx
    expect_contains: "address"
    feature: location-access
    description: "Contact component shows address"

  - id: contact-map
    type: file_check
    path: apps/web/src/components/public/Contact.tsx
    expect_contains: "googleMapsUrl"
    feature: location-access
    description: "Contact includes Google Maps embed"

  # --- AI Agent ---
  - id: agent-tools
    type: file_check
    path: apps/web/src/app/api/agent/route.ts
    expect_contains: "read_section"
    feature: ai-agent
    description: "AI agent has read_section and update_section tools"

  - id: agent-validation
    type: file_check
    path: apps/web/src/app/api/agent/route.ts
    expect_contains: "safeParse"
    feature: ai-agent
    description: "AI agent validates updates with Zod before writing"

  - id: agent-error-handling
    type: file_check
    path: apps/web/src/app/api/agent/route.ts
    expect_contains: "503"
    feature: ai-agent
    description: "AI agent handles Gemini failures with user-friendly error"

  - id: agent-personalized
    type: file_check
    path: apps/web/src/app/api/agent/route.ts
    expect_contains: "businessName"
    feature: ai-agent
    description: "AI agent reads settings for personalized system prompt"

  - id: chat-persistence
    type: file_check
    path: apps/web/src/app/api/chat/route.ts
    feature: ai-agent
    description: "Chat history persistence endpoint exists"

  # --- Dashboard ---
  - id: dashboard-overview
    type: file_check
    path: apps/web/src/app/dashboard/page.tsx
    feature: dashboard
    description: "Dashboard overview page exists"

  - id: dashboard-chat
    type: file_check
    path: apps/web/src/app/dashboard/chat/page.tsx
    feature: dashboard
    description: "Dashboard chat page exists"

  - id: dashboard-content
    type: file_check
    path: apps/web/src/app/dashboard/content/page.tsx
    feature: dashboard
    description: "Content management page exists"

  - id: dashboard-site-preview
    type: file_check
    path: apps/web/src/app/dashboard/site/page.tsx
    feature: dashboard
    description: "Live site preview page exists"

  # --- Landing Page ---
  - id: landing-hero
    type: file_check
    path: apps/marketing/src/components/landing/HeroSection.tsx
    expect_contains: "while you sleep"
    feature: landing-page
    description: "Landing hero has the core value prop"

  - id: landing-custom-message
    type: file_check
    path: apps/marketing/src/components/landing/HeroSection.tsx
    expect_contains: "custom site"
    feature: landing-page
    description: "Landing page says 'custom site' not 'AI builds your site'"

  - id: landing-pricing
    type: file_check
    path: apps/marketing/src/components/landing/PricingSection.tsx
    expect_contains: "$49"
    feature: landing-page
    description: "Landing page shows pricing"

  # --- Infrastructure ---
  - id: types-exist
    type: file_check
    path: apps/web/src/lib/types.ts
    expect_contains: "ContentSection"
    feature: infrastructure
    description: "Content type system exists"

  - id: schemas-zod
    type: file_check
    path: apps/web/src/lib/schemas.ts
    expect_contains: "sectionSchemas"
    feature: infrastructure
    description: "Zod validation schemas for all sections"

  - id: storage-dual-mode
    type: file_check
    path: apps/web/src/lib/storage.ts
    expect_contains: "REDIS_URL"
    feature: infrastructure
    description: "Storage supports Redis and dev-file fallback"

  - id: auth-jwt
    type: file_check
    path: apps/web/src/lib/auth.ts
    expect_contains: "jwtVerify"
    feature: infrastructure
    description: "JWT auth with jose verification"

  - id: middleware-protects
    type: file_check
    path: apps/web/src/middleware.ts
    expect_contains: "/admin"
    feature: infrastructure
    description: "Middleware protects admin and dashboard routes"

  - id: content-api-zod
    type: file_check
    path: apps/web/src/app/api/content/[section]/route.ts
    expect_contains: "sectionSchemas"
    feature: infrastructure
    description: "Content API validates with Zod schemas"

  - id: monorepo-workspace
    type: file_check
    path: pnpm-workspace.yaml
    expect_contains: "apps/*"
    feature: infrastructure
    description: "pnpm workspace configured"

  - id: monorepo-turbo
    type: file_check
    path: turbo.json
    expect_contains: "build"
    feature: infrastructure
    description: "Turborepo configured"
